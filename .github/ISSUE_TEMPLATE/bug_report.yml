name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the problem
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, Browser...